<div class="app-shell">
    <header class="app-header">
        <div>
            <p class="eyebrow">Monthly critical tasks</p>
            <h1>Monthly Dashboard</h1>
        </div>

        <div class="toolbar">
            <label class="field">
                <span>Year</span>
                <input type="number" [(ngModel)]="selectedYear" min="2000" max="2100" />
            </label>

            <label class="field">
                <span>Month</span>
                <select [(ngModel)]="selectedMonth">
                    <option *ngFor="let month of monthOptions" [value]="month.value">
                        {{ month.label }}
                    </option>
                </select>
            </label>

            <button class="primary-btn" (click)="loadDashboard()">Load</button>
        </div>
    </header>

    <div *ngIf="loading" class="state-box">Loading dashboard...</div>
    <div *ngIf="errorMessage" class="state-box error">{{ errorMessage }}</div>

    <main class="dashboard-layout" *ngIf="dashboard && checklist">
        <section class="dashboard-main panel">
            <div class="panel-head">
                <div>
                    <h2>{{ dashboard.monthLabel }}</h2>
                    <p class="subtext">Fixed monthly timeline with visible occurrences</p>
                </div>
            </div>

            <app-timeline-strip
                    [scaleBar]="dashboard.scaleBar"
                    [dayStrip]="dashboard.dayStrip">
            </app-timeline-strip>

            <section class="tasks-panel">
                <div class="tasks-panel-head">
                    <h3>Monthly View</h3>
                </div>

                <app-category-section
                        *ngFor="let category of dashboard.categories"
                        [category]="category"
                        [totalDays]="dashboard.dayStrip.length">
                </app-category-section>
            </section>
        </section>

        <aside class="dashboard-side">
            <app-today-checklist
                    [checklist]="checklist"
                    (markComplete)="onMarkComplete($event)">
            </app-today-checklist>
        </aside>
    </main>
</div>
